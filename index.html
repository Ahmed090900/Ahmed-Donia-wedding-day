<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding of Ahmed & Donia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cairo:wght@300;400;700&family=Cinzel:wght@400;600&family=Reem+Kufi:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050608; 
            --gold-primary: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
            --gold-text: #dfba6b;
            --white-soft: #f4f4f4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--white-soft);
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 1. شاشة التحميل الترحيبية الفاخرة */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .loader-logo {
            font-family: 'Alex Brush', cursive;
            font-size: 6rem;
            background: var(--gold-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseGlow 2s infinite ease-in-out;
        }

        /* 2. رسمة العروسين الأنيميشن المدمجة بالخلفية */
        .wedding-bg-silhouette {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 650px;
            height: 70vh;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" opacity="0.12"><path fill="%23dfba6b" d="M200 450c20-40 10-90 30-130s40-50 40-70-10-40-5-60 20-30 15-50-20-10-20-30 20-30 40-20 20 20 25 35 15 20 25 35c10 15 5 40 15 50s30 15 30 35-15 40-5 60 40 40 50 70 0 80 15 115c5 10 15 15 15 25H200z"/><path fill="%23dfba6b" d="M190 450c10-30 0-70 15-100s35-40 30-65-15-30-10-45 15-25 10-40-15-10-15-25 15-25 30-15 15 15 20 30 10 15 20 30c5 10 0 30 10 40s25 10 25 30-15 30-5 45 35 35 40 60 0 70 10 95H190z" opacity="0.7"/><circle cx="250" cy="80" r="40" fill="none" stroke="%23dfba6b" stroke-width="1" stroke-dasharray="2 4" opacity="0.5"/></svg>') no-repeat bottom center;
            background-size: contain;
            z-index: 2;
            pointer-events: none;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%);
            opacity: 0;
            transition: opacity 2s ease 1s;
        }

        /* جزيئات الغبار الذهبي */
        .particles-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(252,246,186,0.9) 0%, rgba(179,135,40,0) 70%);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        /* الإطار الفاخر */
        .luxury-border {
            position: fixed;
            top: 20px;
            bottom: 20px;
            left: 20px;
            right: 20px;
            border: 1px solid transparent;
            border-image: var(--gold-primary) 1;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transform: scale(1.03);
            transition: all 1.5s cubic-bezier(0.1, 0.8, 0.25, 1) 0.8s;
        }

        .corner {
            position: absolute;
            width: 25px;
            height: 25px;
            border: 2px solid transparent;
            z-index: 11;
            opacity: 0;
            transition: all 1.5s cubic-bezier(0.1, 0.8, 0.25, 1) 1s;
        }
        .top-left { top: 15px; left: 15px; border-top-color: #dfba6b; border-left-color: #dfba6b; transform: translate(-10px, -10px); }
        .top-right { top: 15px; right: 15px; border-top-color: #dfba6b; border-right-color: #dfba6b; transform: translate(10px, -10px); }
        .bottom-left { bottom: 15px; left: 15px; border-bottom-color: #dfba6b; border-left-color: #dfba6b; transform: translate(-10px, 10px); }
        .bottom-right { bottom: 15px; right: 15px; border-bottom-color: #dfba6b; border-right-color: #dfba6b; transform: translate(10px, 10px); }

        /* المحتوى الرئيسي */
        .main-container {
            max-width: 750px;
            width: 90%;
            text-align: center;
            z-index: 5;
            padding: 20px;
        }

        /* تأثير الظهور التدريجي السلس */
        .animate-reveal {
            opacity: 0;
            transform: translateY(25px);
            transition: opacity 1.5s cubic-bezier(0.16, 1, 0.3, 1), transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .monogram {
            font-family: 'Alex Brush', cursive;
            font-size: 5.5rem;
            background: var(--gold-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 6px;
            color: var(--white-soft);
            opacity: 0.7;
        }

        .divider {
            width: 120px;
            height: 1px;
            background: var(--gold-primary);
            margin: 20px auto;
            position: relative;
        }
        .divider::after {
            content: '✦';
            color: #dfba6b;
            position: absolute;
            top: -11px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-color);
            padding: 0 8px;
            font-size: 0.8rem;
        }

        .names {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            font-weight: 600;
            letter-spacing: 4px;
            background: var(--gold-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
            text-shadow: 0px 4px 25px rgba(0,0,0,0.8);
        }

        .invitation-text {
            font-size: 1.2rem;
            line-height: 2;
            margin-bottom: 35px;
            font-weight: 300;
            color: #bbb;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* العداد التنازلي الزجاجي الفاخر */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 35px;
            direction: ltr;
        }

        .countdown-box {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(223, 186, 107, 0.12);
            padding: 20px 15px;
            border-radius: 16px;
            min-width: 105px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .countdown-box:hover {
            transform: translateY(-8px);
            border-color: #dfba6b;
            background: rgba(223, 186, 107, 0.04);
            box-shadow: 0 20px 40px rgba(188, 145, 59, 0.2);
        }

        .countdown-number {
            font-family: 'Cinzel', serif;
            font-size: 2.6rem;
            font-weight: 600;
            background: var(--gold-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
            margin-bottom: 3px;
        }

        .countdown-label {
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            color: var(--white-soft);
            opacity: 0.7;
        }

        .wedding-date {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: var(--gold-text);
            margin-top: 45px;
            letter-spacing: 6px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* تأثيرات حركة الـ Keyframes */
        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(223,186,107,0)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 20px rgba(223,186,107,0.4)); }
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) translateX(0) scale(0.4); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(30px) scale(1); opacity: 0; }
        }

        /* تعديلات الشاشات الصغيرة لجعل رسمة العروسين متناسقة دائماً */
        @media (max-width: 600px) {
            .names { font-size: 2.2rem; letter-spacing: 2px; }
            .monogram { font-size: 4rem; }
            .countdown-container { gap: 8px; }
            .countdown-box { min-width: 75px; padding: 12px 5px; border-radius: 12px; }
            .countdown-number { font-size: 1.6rem; }
            .countdown-label { font-size: 0.75rem; }
            .wedding-bg-silhouette { height: 50vh; opacity: 0.08; }
            .luxury-border { top: 12px; bottom: 12px; left: 12px; right: 12px; }
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-logo">A & D</div>
    </div>

    <div class="particles-container" id="particles"></div>
    <div class="wedding-bg-silhouette" id="weddingSilhouette"></div>
    
    <div class="luxury-border" id="luxuryBorder"></div>
    <div class="corner top-left" id="c1"></div>
    <div class="corner top-right" id="c2"></div>
    <div class="corner bottom-left" id="c3"></div>
    <div class="corner bottom-right" id="c4"></div>

    <div class="main-container">
        
        <div class="monogram animate-reveal" style="transition-delay: 1.2s;">A & D</div> 
        <div class="subtitle animate-reveal" style="transition-delay: 1.4s;">THE WEDDING CELEBRATION</div>
        
        <div class="divider animate-reveal" style="transition-delay: 1.6s;"></div>

        <h1 class="names animate-reveal" style="transition-delay: 1.8s;">AHMED & DONIA</h1>
        
        <p class="invitation-text animate-reveal" style="transition-delay: 2.0s;">
            بكل حب وفرح، ندعوكم لمشاركتنا ليلة العمر وتوثيق أجمل لحظات حياتنا. <br>
            حضوركم يكتمل به السعد وتضاء به الأنوار.
        </p>

        <div class="countdown-container animate-reveal" style="transition-delay: 2.2s;">
            <div class="countdown-box">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">ثانية</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">دقيقة</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">ساعة</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">يوم</span>
            </div>
        </div>

        <div class="wedding-date animate-reveal" style="transition-delay: 2.4s;">
            29 . 10 . 2026
        </div>

    </div>

    <script>
        // إمساك وتفعيل حركة الأنيميشن عند الفتح مباشرة
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            
            setTimeout(() => {
                preloader.style.opacity = '0';
                
                // إظهار الخلفية الفنية للعروسين بسلاسة
                document.getElementById('weddingSilhouette').style.opacity = '1';
                
                // تفعيل الإطارات
                document.getElementById('luxuryBorder').style.opacity = '1';
                document.getElementById('luxuryBorder').style.transform = 'scale(1)';
                ['c1', 'c2', 'c3', 'c4'].forEach(id => {
                    document.getElementById(id).style.opacity = '1';
                    document.getElementById(id).style.transform = 'translate(0, 0)';
                });

                // تفعيل ظهور النصوص والعداد بترتيب زمني منسق
                const reveals = document.querySelectorAll('.animate-reveal');
                reveals.forEach(el => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                });

                setTimeout(() => { preloader.remove(); }, 1000);
            }, 1500); 
        });

        // توليد تأثير جزيئات الغبار الذهبي العصرية
        const particlesContainer = document.getElementById('particles');
        const particleCount = 35;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            const size = Math.random() * 3 + 2; 
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.animationDuration = `${Math.random() * 7 + 7}s`; 
            particle.style.animationDelay = `${Math.random() * 5s}`;
            
            particlesContainer.appendChild(particle);
        }

        // حساب العداد التنازلي التلقائي لـ 29 أكتوبر 2026
        const weddingDate = new Date("October 29, 2026 19:00:00").getTime();

        const countdownInterval = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;

            if (distance < 0) {
                clearInterval(countdownInterval);
                document.querySelector(".countdown-container").innerHTML = "<h2 style='color:#dfba6b; font-family:\"Cairo\";'>اليوم زفاف أحمد ودنيا السعيد! زفاف مبارك</h2>";
            }
        }, 1000);
    </script>
</body>
</html>
